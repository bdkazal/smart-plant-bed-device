<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #374151; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #4b5563; }
      .pin { font: 700 14px Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.4; rx: 12; }
      .softbox { fill: #f8fafc; stroke: #475569; stroke-width: 1.8; rx: 10; }
      .powerbox { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.2; rx: 10; }
      .dangerbox { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .wire { fill: none; stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .wire-thin { fill: none; stroke: #111827; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .wire-power { fill: none; stroke: #dc2626; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .wire-gnd { fill: none; stroke: #2563eb; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .wire-signal { fill: none; stroke: #16a34a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .wire-i2c { fill: none; stroke: #7c3aed; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #111827; stroke: none; }
      .ground { stroke: #2563eb; stroke-width: 2.6; stroke-linecap: round; }
      .component { fill: none; stroke: #111827; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .diode { fill: none; stroke: #111827; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
      .note { font: 600 15px Arial, sans-serif; fill: #7c2d12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
    </marker>
  </defs>

  <rect width="1800" height="1200" fill="#f9fafb" />
  <text x="60" y="62" class="title">Biztola Plant Buddy — Smart Plant Bed Device Schematic</text>
  <text x="60" y="94" class="subtitle">ESP32 DevKit prototype with LR7843 MOSFET valve driver, sensors, OLED, RTC, buttons, and status LEDs</text>

  <!-- ESP32 block -->
  <rect x="110" y="160" width="360" height="780" class="box" />
  <text x="215" y="202" class="label">ESP32 DevKit</text>
  <text x="166" y="228" class="small">3.3V logic / Arduino + PlatformIO</text>

  <!-- ESP pins right -->
  <text x="390" y="305" class="pin">GPIO26</text>
  <circle cx="470" cy="300" r="5" class="node" />
  <text x="390" y="365" class="pin">GPIO27</text>
  <circle cx="470" cy="360" r="5" class="node" />
  <text x="390" y="425" class="pin">GPIO14</text>
  <circle cx="470" cy="420" r="5" class="node" />
  <text x="390" y="505" class="pin">GPIO21 SDA</text>
  <circle cx="470" cy="500" r="5" class="node" />
  <text x="390" y="545" class="pin">GPIO22 SCL</text>
  <circle cx="470" cy="540" r="5" class="node" />
  <text x="390" y="635" class="pin">GPIO32</text>
  <circle cx="470" cy="630" r="5" class="node" />

  <!-- ESP pins left -->
  <text x="130" y="305" class="pin">3V3</text>
  <circle cx="110" cy="300" r="5" class="node" />
  <text x="130" y="345" class="pin">GND</text>
  <circle cx="110" cy="340" r="5" class="node" />
  <text x="130" y="715" class="pin">GPIO34 ADC</text>
  <circle cx="110" cy="710" r="5" class="node" />
  <text x="130" y="795" class="pin">GPIO25</text>
  <circle cx="110" cy="790" r="5" class="node" />
  <text x="130" y="855" class="pin">GPIO33</text>
  <circle cx="110" cy="850" r="5" class="node" />
  <text x="130" y="910" class="pin">GPIO0 / BOOT</text>
  <circle cx="110" cy="905" r="5" class="node" />

  <!-- 12V supply -->
  <rect x="1130" y="120" width="260" height="150" class="powerbox" />
  <text x="1190" y="158" class="label">12V DC Supply</text>
  <text x="1186" y="184" class="small">3A recommended</text>
  <text x="1160" y="226" class="pin">+12V</text>
  <circle cx="1130" cy="220" r="5" class="node" />
  <text x="1160" y="256" class="pin">0V / GND</text>
  <circle cx="1130" cy="250" r="5" class="node" />

  <!-- LM2596 -->
  <rect x="845" y="130" width="220" height="130" class="softbox" />
  <text x="910" y="165" class="label">LM2596</text>
  <text x="875" y="190" class="small">Buck Converter</text>
  <text x="864" y="224" class="small">12V in → 5V/USB/logic rail</text>
  <circle cx="845" cy="175" r="5" class="node" />
  <circle cx="845" cy="225" r="5" class="node" />
  <circle cx="1065" cy="175" r="5" class="node" />
  <circle cx="1065" cy="225" r="5" class="node" />
  <text x="790" y="181" class="tiny">VIN+</text>
  <text x="790" y="231" class="tiny">VIN-</text>
  <text x="1078" y="181" class="tiny">5V+</text>
  <text x="1078" y="231" class="tiny">GND</text>

  <!-- LR7843 MOSFET module -->
  <rect x="760" y="310" width="360" height="250" class="box" />
  <text x="850" y="350" class="label">LR7843 MOSFET Module</text>
  <text x="825" y="376" class="small">Low-side valve / pump switch</text>
  <text x="790" y="425" class="pin">PWM / IN</text>
  <circle cx="760" cy="420" r="5" class="node" />
  <text x="790" y="475" class="pin">Signal GND</text>
  <circle cx="760" cy="470" r="5" class="node" />
  <text x="1010" y="425" class="pin">LOAD+</text>
  <circle cx="1120" cy="420" r="5" class="node" />
  <text x="1010" y="475" class="pin">LOAD-</text>
  <circle cx="1120" cy="470" r="5" class="node" />
  <text x="1010" y="525" class="pin">PWR GND</text>
  <circle cx="1120" cy="520" r="5" class="node" />

  <!-- MOSFET symbol inside module -->
  <line x1="920" y1="430" x2="920" y2="515" class="component" />
  <line x1="950" y1="445" x2="950" y2="505" class="component" />
  <line x1="950" y1="445" x2="1010" y2="445" class="component" />
  <line x1="950" y1="505" x2="1010" y2="505" class="component" />
  <line x1="880" y1="475" x2="920" y2="475" class="component" />
  <text x="875" y="530" class="tiny">MOSFET shown simplified</text>

  <!-- Valve/solenoid symbol -->
  <rect x="1340" y="365" width="300" height="160" class="softbox" />
  <text x="1410" y="400" class="label">12V Solenoid Valve</text>
  <text x="1418" y="423" class="small">Normally Closed</text>
  <path d="M1405 465 q15 -35 30 0 q15 35 30 0 q15 -35 30 0 q15 35 30 0 q15 -35 30 0" class="component" />
  <circle cx="1340" cy="450" r="5" class="node" />
  <circle cx="1640" cy="450" r="5" class="node" />
  <text x="1320" y="440" class="tiny">+</text>
  <text x="1650" y="440" class="tiny">-</text>

  <!-- Flyback diode across valve -->
  <path d="M1370 500 L1610 500" class="wire-thin" />
  <path d="M1455 485 L1505 500 L1455 515 Z" class="diode" />
  <line x1="1515" y1="485" x2="1515" y2="515" class="diode" />
  <text x="1435" y="535" class="small">Flyback diode across valve</text>
  <text x="1435" y="555" class="tiny">Stripe/cathode to +12V side</text>
  <path d="M1370 500 L1370 450" class="wire-thin" />
  <path d="M1610 500 L1610 450" class="wire-thin" />

  <!-- GPIO26 signal and optional LED -->
  <path d="M470 300 H620 V420 H760" class="wire-signal" />
  <text x="530" y="290" class="small">Valve control signal</text>
  <text x="530" y="315" class="tiny">GPIO26 HIGH = valve ON</text>

  <!-- Optional LED indicator on GPIO26 -->
  <path d="M560 300 V235" class="wire-signal" />
  <polyline points="560,235 575,225 590,235 605,225 620,235" class="component" />
  <text x="567" y="213" class="tiny">1kΩ</text>
  <circle cx="650" cy="235" r="15" class="component" />
  <path d="M643 242 L657 228" class="component" />
  <polygon points="648,230 657,228 655,237" fill="#111827" />
  <path d="M665 235 H700 V340" class="wire-thin" />
  <text x="600" y="192" class="small">Optional valve-active LED</text>
  <text x="600" y="212" class="tiny">parallel with MOSFET input, not series</text>

  <!-- Ground bus -->
  <path d="M110 340 H700 V470 H760" class="wire-gnd" />
  <path d="M700 340 H700" class="wire-gnd" />
  <circle cx="700" cy="340" r="5" class="node" />
  <path d="M700 340 H1130 V250" class="wire-gnd" />
  <path d="M1120 520 H1130" class="wire-gnd" />
  <text x="760" y="338" class="small">Common reference ground</text>
  <text x="760" y="360" class="tiny">Signal reference only; valve load current stays in power path</text>

  <!-- 12V power wiring -->
  <path d="M1130 220 H1260 V450 H1340" class="wire-power" />
  <text x="1235" y="210" class="small">+12V valve supply</text>
  <path d="M1640 450 H1690 V470 H1120" class="wire" />
  <path d="M1120 420 H1260 V450" class="wire-power" stroke-dasharray="8 6" />
  <text x="1160" y="442" class="tiny">Some modules expose LOAD+ as pass-through</text>
  <path d="M1130 250 H1130 V520" class="wire-gnd" />

  <!-- 12V to buck -->
  <path d="M1130 220 H1095 V175 H1065" class="wire-power" />
  <path d="M1130 250 H1095 V225 H1065" class="wire-gnd" />
  <path d="M845 175 H825 V130" class="wire-power" />
  <path d="M845 225 H825 V270" class="wire-gnd" />
  <text x="705" y="125" class="tiny">LM2596 input also from 12V rail</text>

  <!-- 5V/3V3 note -->
  <path d="M1065 175 H1170 V100 H530 V300 H110" class="wire-power" stroke-dasharray="8 6" />
  <text x="515" y="122" class="small">Power ESP32 via safe 5V/USB/VIN path from buck output</text>
  <text x="515" y="143" class="tiny">ESP32 3V3 pin powers only small 3.3V sensors/modules if board regulator allows</text>

  <!-- Wi-Fi LED GPIO27 -->
  <path d="M470 360 H560" class="wire-signal" />
  <polyline points="560,360 575,350 590,360 605,350 620,360" class="component" />
  <circle cx="655" cy="360" r="15" class="component" />
  <path d="M648 367 L662 353" class="component" />
  <polygon points="653,355 662,353 660,362" fill="#111827" />
  <path d="M670 360 H700" class="wire-thin" />
  <text x="570" y="342" class="small">Wi-Fi LED</text>
  <text x="575" y="382" class="tiny">330Ω</text>

  <!-- Watering status LED GPIO14 -->
  <path d="M470 420 H560" class="wire-signal" />
  <polyline points="560,420 575,410 590,420 605,410 620,420" class="component" />
  <circle cx="655" cy="420" r="15" class="component" />
  <path d="M648 427 L662 413" class="component" />
  <polygon points="653,415 662,413 660,422" fill="#111827" />
  <path d="M670 420 H700" class="wire-thin" />
  <text x="555" y="465" class="small">Watering LED</text>
  <text x="575" y="442" class="tiny">220Ω–1kΩ</text>

  <!-- I2C OLED and RTC -->
  <rect x="730" y="610" width="250" height="115" class="softbox" />
  <text x="790" y="645" class="label">SSD1306 OLED</text>
  <text x="790" y="670" class="small">I2C 0x3C</text>
  <circle cx="730" cy="650" r="5" class="node" />
  <circle cx="730" cy="690" r="5" class="node" />
  <text x="690" y="655" class="tiny">SDA</text>
  <text x="690" y="695" class="tiny">SCL</text>

  <rect x="1060" y="610" width="250" height="115" class="softbox" />
  <text x="1128" y="645" class="label">DS1307 RTC</text>
  <text x="1112" y="670" class="small">UTC backup clock</text>
  <circle cx="1060" cy="650" r="5" class="node" />
  <circle cx="1060" cy="690" r="5" class="node" />
  <text x="1020" y="655" class="tiny">SDA</text>
  <text x="1020" y="695" class="tiny">SCL</text>

  <path d="M470 500 H650 V650 H730" class="wire-i2c" />
  <path d="M730 650 H1060" class="wire-i2c" />
  <path d="M470 540 H675 V690 H730" class="wire-i2c" />
  <path d="M730 690 H1060" class="wire-i2c" />
  <text x="520" y="520" class="small">Shared I2C bus</text>
  <text x="520" y="545" class="tiny">GPIO21 SDA / GPIO22 SCL</text>

  <!-- DHT11 -->
  <rect x="720" y="780" width="240" height="110" class="softbox" />
  <text x="795" y="815" class="label">DHT11</text>
  <text x="750" y="840" class="small">Display/reporting only</text>
  <circle cx="720" cy="835" r="5" class="node" />
  <text x="680" y="840" class="tiny">DATA</text>
  <path d="M470 630 H600 V835 H720" class="wire-signal" />
  <text x="520" y="620" class="small">Temp/Humidity</text>

  <!-- Soil sensor -->
  <rect x="-10" y="620" width="260" height="125" class="softbox" />
  <text x="35" y="655" class="label">Capacitive Soil</text>
  <text x="48" y="680" class="small">Moisture Sensor</text>
  <circle cx="250" cy="710" r="5" class="node" />
  <text x="260" y="715" class="tiny">AOUT</text>
  <path d="M250 710 H110" class="wire-signal" />
  <text x="25" y="735" class="tiny">VCC 3.3V / GND common</text>

  <!-- 100k pulldown on soil AOUT -->
  <path d="M185 710 V785" class="wire-thin" />
  <polyline points="185,785 175,800 195,815 175,830 195,845 185,860" class="component" />
  <path d="M185 860 V895" class="wire-gnd" />
  <line x1="165" y1="895" x2="205" y2="895" class="ground" />
  <line x1="172" y1="905" x2="198" y2="905" class="ground" />
  <line x1="180" y1="915" x2="190" y2="915" class="ground" />
  <text x="200" y="825" class="small">100kΩ pulldown</text>
  <text x="200" y="845" class="tiny">unplug detection</text>

  <!-- Buttons -->
  <rect x="-10" y="770" width="245" height="70" class="softbox" />
  <text x="30" y="805" class="label">Manual Button</text>
  <circle cx="235" cy="790" r="5" class="node" />
  <path d="M235 790 H110" class="wire-signal" />
  <path d="M60 820 h55" class="component" />
  <line x1="115" y1="810" x2="145" y2="830" class="component" />
  <path d="M145 820 H170 V870" class="wire-gnd" />

  <rect x="-10" y="855" width="245" height="70" class="softbox" />
  <text x="18" y="890" class="label">OLED Wake Button</text>
  <circle cx="235" cy="850" r="5" class="node" />
  <path d="M235 850 H110" class="wire-signal" />
  <path d="M60 910 h55" class="component" />
  <line x1="115" y1="900" x2="145" y2="920" class="component" />
  <path d="M145 910 H170 V955" class="wire-gnd" />

  <!-- ground symbols for button grounds -->
  <line x1="150" y1="870" x2="190" y2="870" class="ground" />
  <line x1="157" y1="880" x2="183" y2="880" class="ground" />
  <line x1="165" y1="890" x2="175" y2="890" class="ground" />
  <line x1="150" y1="955" x2="190" y2="955" class="ground" />
  <line x1="157" y1="965" x2="183" y2="965" class="ground" />
  <line x1="165" y1="975" x2="175" y2="975" class="ground" />

  <!-- BOOT WiFi reset -->
  <rect x="260" y="980" width="310" height="80" class="softbox" />
  <text x="310" y="1015" class="label">BOOT Wi-Fi Reset</text>
  <text x="300" y="1040" class="small">Hold GPIO0/BOOT during startup</text>
  <path d="M110 905 H260 V1020" class="wire-signal" />

  <!-- Notes -->
  <rect x="1180" y="780" width="520" height="300" class="dangerbox" />
  <text x="1210" y="820" class="label">Important wiring rules</text>
  <text x="1210" y="855" class="note">1. Do not power the valve from the ESP32.</text>
  <text x="1210" y="885" class="note">2. GPIO26 only drives the MOSFET input.</text>
  <text x="1210" y="915" class="note">3. ESP32 GND and 12V supply GND need common reference.</text>
  <text x="1210" y="945" class="note">4. Valve load current must stay in the valve/MOSFET power path.</text>
  <text x="1210" y="975" class="note">5. Use flyback diode/protection for inductive solenoid load.</text>
  <text x="1210" y="1005" class="note">6. DS1307 modules often need 5V and I2C level shifting.</text>
  <text x="1210" y="1035" class="note">7. Keep water, 12V wiring, and logic wiring physically separated.</text>

  <!-- Legend -->
  <rect x="60" y="1090" width="1040" height="70" class="softbox" />
  <line x1="90" y1="1115" x2="150" y2="1115" class="wire-power" />
  <text x="160" y="1121" class="small">+12V / power</text>
  <line x1="310" y1="1115" x2="370" y2="1115" class="wire-gnd" />
  <text x="380" y="1121" class="small">GND / reference</text>
  <line x1="560" y1="1115" x2="620" y2="1115" class="wire-signal" />
  <text x="630" y="1121" class="small">GPIO signal</text>
  <line x1="790" y1="1115" x2="850" y2="1115" class="wire-i2c" />
  <text x="860" y="1121" class="small">I2C bus</text>
  <text x="90" y="1145" class="tiny">Schematic is for ESP32 DevKit V1 prototype. Verify module labels before wiring real hardware.</text>
</svg>
